<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Prediction Pool</title>
<style>
  :root{
    --bg:#0a0e1a; --panel:#121829; --panel-2:#1a2238; --line:#2a3553;
    --ink:#f2f5ff; --muted:#8c97b8; --faint:#5d688a;
    --accent:#00d9a3; --accent-2:#ffb547; --accent-ink:#04342c;
    --home:#3a8bd4; --away:#e0794a; --draw:#aab4d4;
    --green:#1d9e75; --red:#e24b4a; --gold:#ffd24a;
    --rad:14px; --rad-sm:9px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    line-height:1.5; min-height:100vh;
    background-image:radial-gradient(circle at 12% -10%, rgba(0,217,163,.08), transparent 40%),
                     radial-gradient(circle at 92% 0%, rgba(255,181,71,.07), transparent 38%);
  }
  .wrap{max-width:940px;margin:0 auto;padding:26px 16px 90px}
  header.top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px}
  .brand{display:flex;align-items:center;gap:14px}
  .crest{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#0fae84);
    display:grid;place-items:center;font-size:24px;flex-shrink:0}
  h1{font-size:22px;font-weight:700;letter-spacing:-.02em;line-height:1.05}
  .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .whoami{font-size:13px;color:var(--muted);text-align:right}
  .whoami b{color:var(--accent)}
  .countdown{display:flex;gap:8px;margin:18px 0 20px}
  .cd{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad-sm);padding:9px 0;text-align:center;flex:1}
  .cd .n{font-size:21px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
  .cd .l{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:5px}
  .tabs{display:flex;gap:5px;background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);padding:5px;margin-bottom:20px;flex-wrap:wrap}
  .tabs button{flex:1 1 120px;border:none;background:transparent;color:var(--muted);font-size:13.5px;font-weight:600;padding:11px 6px;border-radius:9px;cursor:pointer;transition:.15s;white-space:nowrap}
  .tabs button.on{background:var(--panel-2);color:var(--ink);box-shadow:0 0 0 1px var(--line)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);overflow:hidden;margin-bottom:18px}
  .card.pad{padding:22px}
  .grouphdr{display:flex;align-items:center;gap:10px;padding:14px 18px;background:var(--panel-2);border-bottom:1px solid var(--line)}
  .grouphdr .gname{font-size:15px;font-weight:700}
  .grouphdr .teams{font-size:12px;color:var(--muted);margin-left:auto}
  .flag{display:inline-block;width:26px;height:18px;border-radius:3px;object-fit:cover;background:#243049;vertical-align:middle;box-shadow:0 0 0 1px rgba(255,255,255,.08)}
  .flag.lg{width:34px;height:23px}
  .flag.sm{width:20px;height:14px}
  .match{padding:16px 18px;border-bottom:1px solid var(--line)}
  .match:last-child{border-bottom:none}
  .meta{font-size:11px;color:var(--faint);letter-spacing:.03em;margin-bottom:13px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .meta .dot{width:3px;height:3px;border-radius:50%;background:var(--faint)}
  .scorer{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
  .teamcol{display:flex;align-items:center;gap:9px;min-width:0}
  .teamcol.away{flex-direction:row-reverse;text-align:right}
  .teamcol .nm{font-size:13.5px;font-weight:600;line-height:1.15;min-width:0;overflow:hidden;text-overflow:ellipsis}
  .stepper{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
  .stepper .val{font-size:30px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1;width:46px;text-align:center}
  .stepbtns{display:flex;gap:5px}
  .stepbtns button{width:30px;height:28px;border:1px solid var(--line);background:var(--panel-2);color:var(--ink);border-radius:7px;font-size:16px;font-weight:700;cursor:pointer;line-height:1;transition:.1s}
  .stepbtns button:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
  .stepbtns button:active:not(:disabled){transform:scale(.92)}
  .stepbtns button:disabled{opacity:.3;cursor:not-allowed}
  .vs{font-size:13px;font-weight:700;color:var(--faint);padding:0 4px;align-self:center;margin-top:20px}
  .pickstate{font-size:11px;text-align:center;margin-top:11px;color:var(--faint);min-height:15px}
  .pickstate b{color:var(--accent)}
  .pickstate.empty{color:var(--faint)}
  .result-chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;margin-left:auto}
  .result-chip.final{background:rgba(29,158,117,.16);color:var(--green)}
  .pts-badge{font-weight:700;padding:2px 8px;border-radius:6px;font-size:11px;margin-left:6px}
  .pts-5{background:rgba(255,210,74,.18);color:var(--gold)}
  .pts-3{background:rgba(58,139,212,.2);color:#7ab6ec}
  .pts-2{background:rgba(170,180,212,.16);color:var(--draw)}
  .pts-0{background:rgba(226,75,74,.14);color:#f0908f}
  input[type=text]{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);font-size:16px;padding:13px 15px;border-radius:11px;outline:none;text-align:center}
  input[type=text]:focus{border-color:var(--accent)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:var(--accent-ink);border:none;font-size:15px;font-weight:700;padding:12px 22px;border-radius:11px;cursor:pointer;transition:.12s}
  .btn:hover{filter:brightness(1.07)}
  .btn:disabled{opacity:.4;cursor:not-allowed;filter:none}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);font-weight:600}
  .btn.ghost:hover{color:var(--ink)}
  .btn.sm{padding:7px 13px;font-size:12.5px;border-radius:8px}
  .btn.block{width:100%;margin-top:18px;padding:15px}
  .btn.danger{background:transparent;border:1px solid rgba(226,75,74,.5);color:#f0908f}
  .gate{max-width:430px;margin:30px auto;text-align:center}
  .gate h2{font-size:19px;font-weight:700;margin-bottom:8px}
  .gate p{color:var(--muted);font-size:14px;margin-bottom:20px}
  .savebar{position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 32%);padding:18px 0 4px;margin-top:6px}
  .savebar .row{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);padding:13px 18px;display:flex;align-items:center;gap:14px}
  .savebar .prog{flex:1;font-size:13px;color:var(--muted)}
  .savebar .prog b{color:var(--ink)}
  .banner{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:11px;font-size:13px;margin-bottom:18px;line-height:1.45}
  .banner.lock{background:rgba(255,181,71,.12);border:1px solid rgba(255,181,71,.35);color:var(--accent-2)}
  .banner.ok{background:rgba(29,158,117,.14);border:1px solid rgba(29,158,117,.4);color:var(--accent)}
  .banner.info{background:rgba(58,139,212,.12);border:1px solid rgba(58,139,212,.35);color:#8cc0f0}
  .banner.err{background:rgba(226,75,74,.12);border:1px solid rgba(226,75,74,.4);color:#f0908f}
  table.lb{width:100%;border-collapse:collapse}
  table.lb th{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);text-align:left;padding:12px 16px;border-bottom:1px solid var(--line);font-weight:600}
  table.lb th.r,table.lb td.r{text-align:right}
  table.lb td{padding:13px 16px;border-bottom:1px solid var(--line);font-size:14px}
  table.lb tr:last-child td{border-bottom:none}
  table.lb .rank{width:40px;font-weight:700;color:var(--muted)}
  table.lb .rank.g1{color:var(--gold)} table.lb .rank.g2{color:#cdd3e3} table.lb .rank.g3{color:#d39b6a}
  table.lb .who{font-weight:600}
  table.lb .pts{font-weight:700;font-variant-numeric:tabular-nums}
  table.lb .me{background:rgba(0,217,163,.06)}
  .mini{color:var(--muted);font-size:12px;font-variant-numeric:tabular-nums}
  .scoring-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:6px}
  .sc-card{background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:14px}
  .sc-card .pn{font-size:26px;font-weight:700;line-height:1}
  .sc-card .pn.gold{color:var(--gold)} .sc-card .pn.blue{color:#7ab6ec} .sc-card .pn.gray{color:var(--draw)}
  .sc-card .pl{font-size:12.5px;color:var(--muted);margin-top:6px;line-height:1.4}
  .admin-match{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;padding:13px 18px;border-bottom:1px solid var(--line)}
  .admin-match:last-child{border-bottom:none}
  .admin-score{display:flex;align-items:center;gap:6px;justify-content:center}
  .admin-score input{width:42px;text-align:center;padding:8px 4px;font-size:17px;font-weight:700}
  .empty{text-align:center;padding:50px 20px;color:var(--muted)}
  .empty .big{font-size:34px;margin-bottom:12px}
  .hint{font-size:12px;color:var(--faint);text-align:center;margin-top:14px;line-height:1.6}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(80px);background:var(--accent);color:var(--accent-ink);font-weight:700;font-size:14px;padding:13px 24px;border-radius:12px;opacity:0;transition:.3s;z-index:50;pointer-events:none}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .loading{text-align:center;padding:60px;color:var(--muted)}
  .setupwarn{max-width:560px;margin:40px auto;text-align:center;padding:26px;background:rgba(226,75,74,.08);border:1px solid rgba(226,75,74,.35);border-radius:14px}
  .setupwarn h2{font-size:18px;color:#f0908f;margin-bottom:10px}
  .setupwarn p{font-size:13.5px;color:var(--muted);line-height:1.6}
  .setupwarn code{background:#1a2238;padding:2px 6px;border-radius:5px;color:var(--accent);font-size:12px}
  .pts-8,.pts-7{background:rgba(255,210,74,.18);color:var(--gold)}
  .pts-6{background:rgba(58,139,212,.2);color:#7ab6ec}
  .pts-4{background:rgba(170,180,212,.16);color:var(--draw)}
  .pts-big{background:rgba(255,210,74,.22);color:var(--gold)}
  .pens-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;font-size:12px;color:var(--muted)}
  .pens-row label{display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
  .pens-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
  .adv-pick{display:flex;gap:6px;justify-content:center;margin-top:8px;flex-wrap:wrap}
  .adv-pick button{font-size:11.5px;padding:5px 11px;border-radius:7px;border:1px solid var(--line);background:var(--panel-2);color:var(--muted);cursor:pointer;font-weight:600}
  .adv-pick button.sel{border-color:var(--accent);color:var(--accent);background:rgba(0,217,163,.1)}
  .roundnav{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px}
  .roundnav button{flex:0 0 auto;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:9px;cursor:pointer;white-space:nowrap}
  .roundnav button.on{background:var(--panel-2);color:var(--ink);border-color:var(--accent)}
  .roundnav button .tag{font-size:9px;opacity:.7;margin-left:5px}
  .br-round{margin-bottom:18px}
  .br-round h3{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:9px;display:flex;justify-content:space-between}
  .br-round h3 .w{font-weight:400;font-size:11.5px}
  .br-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:7px}
  .br-match{border:1px solid var(--line);border-radius:9px;padding:6px;background:var(--panel)}
  .br-team{display:block;width:100%;text-align:left;margin:2px 0;padding:7px 9px;font-size:12.5px;border-radius:7px;border:1px solid var(--line);background:transparent;cursor:pointer;color:var(--ink);display:flex;align-items:center;gap:7px}
  .br-team.sel{background:rgba(0,217,163,.12);border-color:var(--accent);font-weight:600}
  .br-team.correct{background:rgba(29,158,117,.18);border-color:var(--green)}
  .br-team.wrong{opacity:.5}
  .br-team:disabled{cursor:default}
  .br-champ{border:1px solid var(--accent);border-radius:10px;padding:12px;text-align:center;background:rgba(0,217,163,.06);margin-top:4px}
  .br-champ .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  /* ===== bracket tree ===== */
  .tree-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:6px 2px 14px}
  .tree{display:flex;align-items:stretch;gap:6px;width:100%}
  .tree-col{flex:1 1 0;min-width:0;display:flex;flex-direction:column;justify-content:space-around;gap:8px}
  .tree-col.r16,.tree-col.qf,.tree-col.sf{flex:1 1 0;min-width:0}
  .tree-colhdr{font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);text-align:center;margin-bottom:6px;font-weight:700}
  .tree-match{border:1px solid var(--line);border-radius:8px;padding:4px;background:var(--panel);min-width:0}
  .tree-match.right .br-team{flex-direction:row-reverse;text-align:right}
  .tree-center{flex:1 1 0;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
  .tree .br-team{font-size:11px;padding:5px 5px;gap:4px;min-width:0;overflow:hidden}
  .tree .br-team .bn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .tree .br-team .flag{flex:0 0 auto}
  .tree .br-team .abbr{display:none}
  .tree .br-team .full{display:inline}
  .tree-final{border:1px solid var(--accent);border-radius:10px;padding:7px;background:rgba(0,217,163,.05);width:100%}
  .tree-final .fhdr{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);text-align:center;margin-bottom:6px;font-weight:700}
  .tree-trophy{font-size:30px;text-align:center;line-height:1}
  .tree-champ{border:1px dashed var(--accent);border-radius:10px;padding:10px;text-align:center;background:rgba(0,217,163,.06);width:100%}
  .tree-champ .lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;font-weight:700}
  .tree-champ .team{font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;min-height:22px}
  .tree-hint{font-size:11px;color:var(--faint);text-align:center;margin:-4px 0 10px}
  .award-row{margin-bottom:16px}
  .award-row label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--ink)}
  .award-row .desc{font-size:11.5px;color:var(--faint);margin-bottom:7px}
  .award-row input{text-align:left;font-size:14px;padding:11px 13px}
  .gw-chip{font-size:11px;padding:3px 9px;border-radius:6px;margin-left:8px;font-weight:700}
  .gw-chip.hit{background:rgba(29,158,117,.18);color:var(--green)}
  .br-toggle{display:flex;gap:5px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:4px;margin-bottom:14px}
  .br-toggle button{flex:1;border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:600;padding:9px;border-radius:8px;cursor:pointer}
  .br-toggle button.on{background:var(--panel-2);color:var(--ink);box-shadow:0 0 0 1px var(--line)}
  .track{background:var(--panel-2);border-radius:6px;overflow:hidden;position:relative}
  .fill{height:100%;border-radius:6px;transition:width .4s ease;min-width:2px}
  .fill.h{background:var(--home)} .fill.a{background:var(--away)}
  .pool-roundhdr{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:16px 2px 9px}
  .pool-tree-scroll{overflow-x:auto}
  .pool-tree{display:flex;gap:8px;width:100%}
  .ps-col{flex:1 1 0;min-width:0;display:flex;flex-direction:column;gap:7px}
  .ps-match{border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--panel)}
  .ps-row{position:relative;display:flex;align-items:center;gap:6px;padding:5px 7px;font-size:12px;overflow:hidden}
  .ps-row+.ps-row{border-top:1px solid var(--line)}
  .ps-bar{position:absolute;left:0;top:0;height:100%;z-index:0;transition:width .4s ease}
  .ps-bar.h{background:rgba(58,139,212,.20)} .ps-bar.a{background:rgba(224,121,74,.20)}
  .ps-row>.flag,.ps-row>.ps-code,.ps-row>.ps-pct{position:relative;z-index:1}
  .ps-row .flag{flex:0 0 auto;width:18px;height:12px}
  .ps-code{font-weight:600;letter-spacing:.02em;min-width:30px}
  .ps-pct{margin-left:auto;font-weight:700;font-variant-numeric:tabular-nums;color:var(--muted)}
  .ps-row.lead .ps-pct{color:var(--ink)}
  .ps-row.win .ps-code{color:var(--green)}
  .ps-row.win::after{content:"✓";color:var(--green);font-weight:700;margin-left:4px;position:relative;z-index:1}
  .lb-groupwrap{margin-top:6px}
  .lb-grouptop{display:flex;align-items:center;justify-content:space-between;margin:14px 2px 8px}
  .lb-grouptop .gs-title{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
  .lb-acc{margin-bottom:8px}
  .lb-acchdr{user-select:none}
  .lb-acchdr:hover{background:var(--panel)}
  .gw-chip.miss{background:rgba(226,75,74,.14);color:#f0908f}
  .lbcaret{font-size:11px;color:var(--faint);margin-left:4px}
  .lbrow:hover{background:rgba(255,255,255,.02)}
  .perfcell{padding:0 16px 14px!important}
  .perfcard{background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:12px 14px;display:flex;flex-direction:column;gap:9px}
  .perfline{display:flex;gap:10px;align-items:flex-start;font-size:13px;line-height:1.6;direction:rtl;text-align:right}
  .perfline .pi{flex:0 0 auto;font-size:15px}
  .perfline b{color:var(--accent);font-weight:700}
  .news-strip{background:rgba(0,217,163,.10);border:1px solid rgba(0,217,163,.35);border-radius:11px;margin-bottom:14px;overflow:hidden}
  .news-head{display:flex;align-items:center;gap:9px;padding:10px 12px;cursor:pointer}
  .news-emoji{flex:0 0 auto;font-size:16px}
  .news-txt{font-size:12.5px;color:var(--ink);line-height:1.5}
  .news-txt b{color:var(--accent);font-weight:700}
  .news-x{flex:0 0 auto;margin-left:auto;background:transparent;border:none;color:var(--faint);font-size:14px;cursor:pointer;padding:2px 4px;line-height:1}
  .news-list{margin:0;padding:0 14px 12px 30px;list-style:none}
  .news-list li{font-size:12.5px;color:var(--muted);line-height:1.7;position:relative;padding-left:14px}
  .news-list li::before{content:"·";position:absolute;left:0;color:var(--accent);font-weight:700}
  .hussen-photo{margin-bottom:4px}
  .hussen-photo img{width:100%;max-width:300px;border-radius:10px;display:block;margin:0 auto;border:1px solid var(--line)}
  .hussen-photo .cap{font-size:11.5px;color:var(--faint);text-align:center;margin-top:6px;direction:rtl}
  @media(max-width:560px){
    .wrap{padding:18px 10px 80px}
    h1{font-size:18px}
    .sub{font-size:11.5px}
    .crest{width:38px;height:38px;font-size:20px}
    .whoami{font-size:12px}
    .countdown{gap:5px;margin:14px 0 16px}
    .cd .n{font-size:18px} .cd .l{font-size:8.5px;letter-spacing:.08em}
    .tabs{gap:3px;padding:4px}
    .tabs button{flex:1 1 auto;font-size:12px;padding:9px 4px}
    .teamcol .nm{font-size:12px}
    .stepper .val{font-size:24px;width:38px}
    .stepbtns button{width:26px}
    .tree-col,.tree-col.r16,.tree-col.qf,.tree-col.sf{min-width:0}
    .tree-center{min-width:0}
    .tree .br-team{font-size:10.5px;padding:5px 3px;gap:3px;justify-content:center}
    .tree .br-team .full{display:none}
    .tree .br-team .abbr{display:inline}
    .tree .flag.sm{width:16px;height:11px}
    /* leaderboard: tighten padding, shrink number columns, keep Total prominent */
    .card.pad{padding:16px}

/* ===== scoring engine (5 / 3 / 2 / 0) ===== */
function scorePoints(pred,res){
  if(!pred||!res)return null;
  if(pred.h===res.h&&pred.a===res.a)return 5;
  const out=o=>o.h>o.a?1:o.h<o.a?-1:0;
  if(out(pred)!==out(res))return 0;
  if(out(res)===0)return 2;
  if((pred.h-pred.a)===(res.h-res.a))return 3;
  return 2;
}
const PTS_CLASS=p=>p===5?"pts-5":p===3?"pts-3":p===2?"pts-2":"pts-0";

/* Round definitions: key, label, multiplier, number of matches */
const KO_ROUNDS = [
  {key:"R32", name:"Round of 32",       mult:1.5, n:16},
  {key:"R16", name:"Round of 16",       mult:2,   n:8},
  {key:"QF",  name:"Quarter-finals",    mult:3,   n:4},
  {key:"SF",  name:"Semi-finals",       mult:4,   n:2},
  {key:"F",   name:"Final & 3rd place", mult:5,   n:2}
];
const KO_BY_KEY = Object.fromEntries(KO_ROUNDS.map(r=>[r.key,r]));
/* A knockout match id is `${roundKey}-${index}` e.g. "R32-0".
   KOFIX (admin-set, stored in meta/knockout) maps id -> {home,away,ko,venue}.
   Defaults below are seeded with the confirmed/projected R32; admin edits in Results tab. */
function emptyKoFixtures(){
  const f={};
  for(const r of KO_ROUNDS){ for(let i=0;i<r.n;i++){ f[`${r.key}-${i}`]={home:"",away:"",ko:"",venue:""}; } }
  return f;
}
/* Seed for R32 — CONFIRMED bracket (official matchups, dates, venues).
   Stored in the slot order that makes the bracket's later rounds connect correctly.
   Admin can still edit any of these in Results → Knockout stage. */
const R32_SEED = [
  ["South Africa","Canada","2026-06-28T19:00Z","Los Angeles Stadium"],
  ["Netherlands","Morocco","2026-06-30T01:00Z","Monterrey Stadium"],
  ["Germany","Paraguay","2026-06-29T20:30Z","Boston Stadium"],

  ["Belgium","Senegal","2026-07-01T23:00Z","Seattle Stadium"],
  ["Brazil","Japan","2026-06-29T17:00Z","Houston Stadium"],
  ["Ivory Coast","Norway","2026-06-30T17:00Z","Dallas Stadium"],

function seededKoFixtures(){
  const f=emptyKoFixtures();
  R32_SEED.forEach((m,i)=>{ f[`R32-${i}`]={home:m[0],away:m[1],ko:m[2],venue:m[3]}; });
  return f;
}
/* Bump this whenever the seeded R32 changes. If the stored fixtures are older,
   the app refreshes R32 from the seed (without touching later rounds the admin may have set). */
const KOFIX_SEED_VERSION = 3;  // 3 = corrected bracket (Portugal & Argentina opposite halves)

/* base 5/3/2/0 tier reused from scorePoints, but returns tier int */
function baseTier(pred,res){
  if(pred.h===res.h&&pred.a===res.a)return 5;
  const out=o=>o.h>o.a?1:o.h<o.a?-1:0;
  if(out(pred)!==out(res))return 0;
  if(out(res)===0)return 2;
  if((pred.h-pred.a)===(res.h-res.a))return 3;
  return 2;
}
/* knockout score. pred={h,a,pens,adv}, res={h,a,pens,advTeam}, roundKey
   Model: scoreline = baseTier × round multiplier (unchanged).
   PLUS a flat, un-multiplied shootout bonus when the match actually went to
   penalties and the player predicted a draw + ticked pens + named the correct
   surviving team — independent of whether their exact draw score was right. */
const PEN_FLAT_BONUS = 3;
function koScore(pred,res,roundKey){
  if(!pred||!res)return null;
  if(res.h==null||res.a==null)return null;
  const mult=KO_BY_KEY[roundKey].mult;
  const tier=baseTier(pred,res);
  let pts=Math.round(tier*mult);
  // flat shootout bonus (not multiplied)
  if(res.h===res.a && res.pens){            // actual match was a draw decided on pens
    const predictedDraw = pred.h===pred.a;
    const predictedPens = !!pred.pens;
    const advCorrect = pred.adv && res.advTeam && pred.adv===res.advTeam;
    if(predictedDraw && predictedPens && advCorrect) pts += PEN_FLAT_BONUS;
  }
  return pts;
}
function koPtsClass(p){
  if(p==null)return "";
  if(p>=15)return "pts-big";
  if(p>=7)return "pts-8";
  if(p>=6)return "pts-6";
  if(p>=4)return "pts-4";
  if(p>=2)return "pts-2";
  return "pts-0";
}

/* ===== BRACKET BONUS ===== */
/* A player's bracket is stored as bracket = { advance:{koMatchId:teamName}, champ:teamName }.
   We derive which teams they have reaching each round, then compare to reality. */
const BRACKET_PIECE = {r16:1, qf:3, sf:5, final:10, champ:20}; // sums to 100 at perfection
/* From an advance map, compute the set of teams reaching each round.
   advance maps each match id to the predicted winner; a team "reaches QF" if it won its R16 match, etc. */
function teamsReaching(advance){
  const reach={R16:new Set(),QF:new Set(),SF:new Set(),F:new Set()};
  for(const r of KO_ROUNDS){
    for(let i=0;i<r.n;i++){
      const w=advance[`${r.key}-${i}`];
      if(!w)continue;
      // winner of R32 match reaches R16; winner of R16 reaches QF; etc.
      const nextIdx = {R32:"R16",R16:"QF",QF:"SF",SF:"F"}[r.key];
      if(nextIdx) reach[nextIdx].add(w);
    }
  }
  return reach;
}
/* actual reach derived the same way from RESULTS advance (admin-confirmed advancers). */
function bracketScore(bracket, koResults){
  if(!bracket||!bracket.advance)return {total:0,parts:{}};
  const mine=teamsReaching(bracket.advance);
  // build actual advancers from results
  const actualAdvance={};
  for(const r of KO_ROUNDS){
    for(let i=0;i<r.n;i++){
      const id=`${r.key}-${i}`, res=koResults[id];
      if(res&&res.advTeam) actualAdvance[id]=res.advTeam;
      else if(res&&res.h!=null&&res.a!=null&&res.h!==res.a){
        // infer winner from score if no explicit advTeam
        const fx=(KOFIX[id]||{}); actualAdvance[id]= res.h>res.a?fx.home:fx.away;
      }
    }
  }
  const actual=teamsReaching(actualAdvance);
  const inter=(a,b)=>[...a].filter(x=>b.has(x)).length;
  const parts={
    r16: inter(mine.R16,actual.R16)*BRACKET_PIECE.r16,
    qf:  inter(mine.QF, actual.QF )*BRACKET_PIECE.qf,
    sf:  inter(mine.SF, actual.SF )*BRACKET_PIECE.sf,
    final: inter(mine.F, actual.F )*BRACKET_PIECE.final,
    champ: 0
  };
  // champion: F-0 winner in reality (final is F-0)
  const actualChamp = actualAdvance["F-0"]||null;
  if(bracket.champ && actualChamp && bracket.champ===actualChamp) parts.champ=BRACKET_PIECE.champ;
  const total=parts.r16+parts.qf+parts.sf+parts.final+parts.champ;
  return {total, parts};
}

/* ===== GOLDEN AWARDS ===== */
function goldenScore(golden, goldenWinners){
  if(!golden||!goldenWinners)return 0;
  const norm=s=>(s||"").toLowerCase().trim();
  let p=0;
  if(golden.boot && goldenWinners.boot && norm(golden.boot)===norm(goldenWinners.boot)) p+=5;
  if(golden.glove&& goldenWinners.glove&& norm(golden.glove)===norm(goldenWinners.glove)) p+=5;
  if(golden.ball && goldenWinners.ball && norm(golden.ball)===norm(goldenWinners.ball)) p+=5;
  return p;
}

      KOFIX = savedFix;
    } else {
      // stored fixtures are stale (old projection) or absent → use the confirmed seed,
      // but keep any later-round fixtures the admin may already have set
      const seeded = seededKoFixtures();
      if(savedFix){ for(const id in savedFix){ if(!id.startsWith("R32-") && id!=="__ver" && savedFix[id] && savedFix[id].home) seeded[id]=savedFix[id]; } }
      KOFIX = seeded;

/* ===== persistence for KO/bracket/golden ===== */
async function persistFull(){
  // sanitize: a non-draw prediction must never carry penalty fields
  for(const id in KOPICKS){ const p=KOPICKS[id]; if(p && p.h!==p.a){ delete p.pens; delete p.adv; } }
  try{ await fbSavePlayerFull(slug(ME),ME,{picks:PICKS,koPicks:KOPICKS,bracket:BRACKET,golden:GOLDEN}); }
  catch(e){ toast("Save failed — check connection"); }
}

/* anonymous R32 pool view: how the whole pool voted on each R32 match (percentages, no names) */
function bracketPoolHTML(){
  if(!bracketLocked()){
    return `<div class="banner lock"><span>🔒</span><span>The pool view opens once brackets lock (first R32 kickoff) — so nobody can copy before the deadline.</span></div>`;
  }
  if(ALL.length===0){
    return `<div class="card pad empty"><div class="big">🗳️</div>No brackets in the pool yet.</div>`;
  }
  let h=`<div class="banner ok"><span>📊</span><span>How the whole pool sees the tournament — anonymous, from all ${ALL.length} brackets. Round of 32 shows the two-way split; later rounds rank every team by the share of brackets that send it that far.</span></div>`;
  h+=`<div class="pool-roundhdr">Round of 32 — pool split</div>`;
  // compact bracket-shaped R32: left = slots 0-7, right = slots 8-15
  const poolSlot=(i)=>{
    const id=`R32-${i}`, fx=KOFIX[id];
    if(!fx||!fx.home||!fx.away)return "";
    let hc=0,ac=0;
    ALL.forEach(p=>{ const w=p.bracket&&p.bracket.advance&&p.bracket.advance[id]; if(w===fx.home)hc++; else if(w===fx.away)ac++; });
    const tot=hc+ac, hp=tot?Math.round(hc/tot*100):0, ap=tot?100-hp:0;
    const res=KORES[id];
    const realW = res ? (res.advTeam || (res.h>res.a?fx.home:res.h<res.a?fx.away:null)) : null;
    const row=(team,pct,lead,side)=>`<div class="ps-row${realW===team?' win':''}${lead?' lead':''}"><div class="ps-bar ${side}" style="width:${pct}%"></div>${flagImg(team,'sm')}<span class="ps-code">${esc(abbr(team))}</span><span class="ps-pct">${pct}%</span></div>`;
    return `<div class="ps-match">${row(fx.home,hp,hp>=ap,'h')}${row(fx.away,ap,ap>hp,'a')}</div>`;
  };
  h+=`<div class="pool-tree-scroll"><div class="pool-tree">`;
  h+=`<div class="ps-col">`; for(let i=0;i<8;i++)h+=poolSlot(i); h+=`</div>`;
  h+=`<div class="ps-col">`; for(let i=8;i<16;i++)h+=poolSlot(i); h+=`</div>`;
  h+=`</div></div>`;
  // ===== R16 → Champion: ranked "% of brackets that send each team this far" =====
  // tally each round across all brackets using teamsReaching; champion = F-0 winner
  const roundTally={R16:{},QF:{},SF:{},F:{},CH:{}};
  const roundDenom={R16:0,QF:0,SF:0,F:0,CH:0};
  ALL.forEach(p=>{
    const adv=(p.bracket&&p.bracket.advance)||{};
    const reach=teamsReaching(adv);
    ["R16","QF","SF","F"].forEach(rk=>{
      if(reach[rk] && reach[rk].size){ roundDenom[rk]++; reach[rk].forEach(t=>{ roundTally[rk][t]=(roundTally[rk][t]||0)+1; }); }
    });
    const champ=(p.bracket&&p.bracket.champ)||null;
    if(champ){ roundDenom.CH++; roundTally.CH[champ]=(roundTally.CH[champ]||0)+1; }
  });
  const roundMeta=[["R16","Round of 16"],["QF","Quarter-finals"],["SF","Semi-finals"],["F","Final"],["CH","Champion"]];
  for(const [key,label] of roundMeta){
    const tally=roundTally[key], denom=roundDenom[key];
    const teams=Object.keys(tally).sort((a,b)=>tally[b]-tally[a]);
    h+=`<div class="pool-roundhdr">${label}${key==="F"?" (reaching)":""}</div>`;
    if(teams.length===0 || denom===0){ h+=`<div class="card pad mini">No bracket picks reach this round yet.</div>`; continue; }
    h+=`<div class="card" style="padding:11px 13px;margin-bottom:10px;display:flex;flex-direction:column;gap:7px">`;
    teams.forEach(t=>{
      const pc=Math.round(tally[t]/denom*100);
      h+=`<div style="display:flex;align-items:center;gap:10px">
        <span style="min-width:110px;font-size:13px;font-weight:500">${flagImg(t,'sm')} ${esc(t)}</span>
        <div class="track" style="flex:1;height:16px"><div class="fill h" style="width:${pc}%"></div></div>
        <span style="min-width:36px;text-align:right;font-size:12.5px;font-weight:700;color:#7ab6ec">${pc}%</span>
      </div>`;
    });
    h+=`</div>`;
  }
  return h;
}

/* one-time validation of a loaded bracket against current fixtures:
   walk round by round, dropping any advance pick whose team isn't in that slot's matchup.
   Because R16+ matchups derive from earlier picks, dropping an early pick cascades correctly. */
function sanitizeBracket(){
  if(!BRACKET||!BRACKET.advance)return;
  // R32: each pick must be one of the two teams actually in that fixture
  for(let i=0;i<16;i++){
    const id=`R32-${i}`, fx=KOFIX[id]||{}, w=BRACKET.advance[id];
    if(w && w!==fx.home && w!==fx.away) delete BRACKET.advance[id];
  }
  // R16/QF/SF/F: each must match the teams that (now) feed it
  for(let ri=1; ri<KO_ROUNDS.length; ri++){
    const r=KO_ROUNDS[ri];
    for(let i=0;i<r.n;i++){
      const id=`${r.key}-${i}`, pair=bracketPairFor(r.key,i), w=BRACKET.advance[id];
      if(w && w!==pair[0] && w!==pair[1]) delete BRACKET.advance[id];
    }
  }
  const finals=bracketPairFor("F",0);
  if(BRACKET.champ && BRACKET.champ!==finals[0] && BRACKET.champ!==finals[1]) BRACKET.champ="";
}
function pruneBracket(){
  for(let ri=1; ri<KO_ROUNDS.length; ri++){
    const r=KO_ROUNDS[ri];
    for(let i=0;i<r.n;i++){
      const id=`${r.key}-${i}`;
      const pair=bracketPairFor(r.key,i);
      const w=BRACKET.advance[id];
      if(w && w!==pair[0] && w!==pair[1]) delete BRACKET.advance[id];
    }
  }
  const finals=bracketPairFor("F",0);
  if(BRACKET.champ && BRACKET.champ!==finals[0] && BRACKET.champ!==finals[1]) BRACKET.champ="";
}

function tallyPlayer(p){
  let pts=0,exact=0,played=0,correct=0;
  // group stage
  for(const id in RESULTS){
    const pred=p.picks?.[id];if(!pred)continue;
    const s=scorePoints(pred,RESULTS[id]);if(s===null)continue;
    played++;pts+=s;if(s===5)exact++;if(s>=2)correct++;
  }
  let koPts=0;
  for(const id in KORES){
    const pred=p.koPicks?.[id];if(!pred)continue;
    const rkey=id.split("-")[0];
    const s=koScore(pred,KORES[id],rkey);if(s===null)continue;
    koPts+=s;
  }
  const brk = bracketScore(p.bracket||{advance:{},champ:""},KORES).total;
  const gld = goldenScore(p.golden||{},GOLDEN_WINNERS||{});
  const groupPts=pts;
  const total=groupPts+koPts+brk+gld;
  return {pts:total,groupPts,koPts,brk,gld,exact,played,correct,picks:Object.keys(p.picks||{}).length};
}
/* ===== performance analysis: personalized, consensus-based ===== */
function outcomeOf(o){ return o.h>o.a?"H":o.h<o.a?"A":"D"; }
function matchTeams(id){
  // group ids are like "A1".."L6"; knockout ids like "R32-3"
  if(/^[A-L][1-6]$/.test(id)){ const m=M.find(x=>x.id===id); return m?{home:m.home,away:m.away}:{home:"?",away:"?"}; }
  const fx=KOFIX[id]||{}; return {home:fx.home||"?",away:fx.away||"?"};
}
function pickLabel(id,p){ const m=matchTeams(id); return `${m.home} ${p.h}–${p.a} ${m.away}`; }
function gradeOf(pred,res,id){ const ko=/-/.test(id); return ko?koScore(pred,res,id.split("-")[0]):scorePoints(pred,res); }

/* pool consensus per graded match */
function buildConsensus(){
  const cons={};
  const allRes=Object.assign({},RESULTS,KORES);
  for(const id in allRes){
    const tally={H:0,A:0,D:0};
    ALL.forEach(pl=>{
      const p = /-/.test(id)? pl.koPicks?.[id] : pl.picks?.[id];
      if(p) tally[outcomeOf(p)]++;
    });
    const total=tally.H+tally.A+tally.D;
    let top="H"; if(tally.A>tally[top])top="A"; if(tally.D>tally[top])top="D";
    cons[id]={tally,total,top};
  }
  return cons;
}
/* map: matchId -> [names who got the outcome right] (for lone-wolf detection) */
function buildRightMap(){
  const rm={}; const allRes=Object.assign({},RESULTS,KORES);
  for(const id in allRes){
    rm[id]=[];
    ALL.forEach(pl=>{
      const p=/-/.test(id)?pl.koPicks?.[id]:pl.picks?.[id];
      if(p && gradeOf(p,allRes[id],id)>= (/-/.test(id)?1:2)) rm[id].push(pl.name);
    });
  }
  return rm;
}
function playerStats(pl,cons){
  let played=0,exact=0,correct=0,pts=0,predDraws=0,gp=0,ga=0;
  let bestStreak=0,curStreak=0,contrarianHits=0;
  const allRes=Object.assign({},RESULTS,KORES);
  for(const id in allRes){
    const p=/-/.test(id)?pl.koPicks?.[id]:pl.picks?.[id];
    if(!p)continue;
    const r=allRes[id], t=gradeOf(p,r,id); if(t===null)continue;
    played++; pts+=t;
    if(p.h===r.h&&p.a===r.a)exact++;
    const positive=t>=(/-/.test(id)?1:2);
    if(positive){correct++;curStreak++;if(curStreak>bestStreak)bestStreak=curStreak;}else curStreak=0;
    if(outcomeOf(p)==="D")predDraws++;
    gp+=p.h+p.a; ga+=r.h+r.a;
    const c=cons[id];
    if(c&&c.total>=3&&outcomeOf(p)!==c.top&&positive)contrarianHits++;
  }
  if(played===0)return null;
  return {name:pl.name,played,exact,correct,pts,predDraws,gp,ga,
    exactRate:exact/played,correctRate:correct/played,
    avgGP:gp/played,avgGA:ga/played,ppg:pts/played,contrarianHits,bestStreak};
}
function assignSuperlatives(statsArr){
  const titles={}; const elig=statsArr.filter(s=>s&&s.played>=5);
  const grab=(key,title)=>{ const sorted=[...elig].filter(s=>!titles[s.name]&&s[key]>0).sort((a,b)=>b[key]-a[key]); if(sorted.length)titles[sorted[0].name]=title; };
  grab("exact","🎯 صاحب أكتر نتايج مظبوطة (most exact scores)");
  grab("contrarianHits","🦅 ملك العكس (best against the grain)");
  grab("ppg","👑 الأعلى نقاط في المتوسط (best average)");
  grab("bestStreak","🔥 أطول سلسلة صح (longest hot streak)");
  grab("predDraws","🤝 عاشق التعادل (the draw whisperer)");
  grab("avgGP","💣 ملك المهرجانات (the goal-fest king)");
  return titles;
}
/* scan ALL of a player's picks and emit scored candidate insights; higher score shown first */
/* seeded shuffle: stable per seed (so a player's card order doesn't flicker on re-render, but differs between players) */
function seededShuffle(arr,seed){
  let s=0; for(const c of String(seed))s=(s*31+c.charCodeAt(0))>>>0;
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){ s=(s*1103515245+12345)>>>0; const j=s%(i+1); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function detectInsights(pl,cons,rmap){

  const ids=Object.keys(allRes).filter(id=>{const p=/-/.test(id)?pl.koPicks?.[id]:pl.picks?.[id];return !!p;});
  const pk=id=>/-/.test(id)?pl.koPicks[id]:pl.picks[id];
  const played=ids.length;
  const ins=[];
  if(played<5) return [{score:99,icon:"⏳",text:`لسه بدري نحكم — ${played} ماتش بس. (too few graded yet.)`}];

  const scoreUse={}, teamBack={}, teamMiss={}, byDay={};

    pts+=t; if(p.h===r.h&&p.a===r.a)exact++; if(t>=(/-/.test(id)?1:2))correct++;
    const k=p.h+"-"+p.a; scoreUse[k]=(scoreUse[k]||0)+1;
    gp+=p.h+p.a; ga+=r.h+r.a;
    const tot=Math.abs(p.h-r.h)+Math.abs(p.a-r.a);
    if(t>=2&&t<5&&tot===1)almost++;
    const m=matchTeams(id), po=outcomeOf(p);
    [["H",m.home],["A",m.away]].forEach(([side,team])=>{ if(!team||team==="?")return;
      if(po===side){teamBack[team]=teamBack[team]||{n:0,hit:0};teamBack[team].n++;if(t>=2)teamBack[team].hit++;}
      teamMiss[team]=teamMiss[team]||{n:0,wrong:0};teamMiss[team].n++;if(t===0)teamMiss[team].wrong++;
    });
    const day = /-/.test(id)? id.split("-")[0] : id[0];
    byDay[day]=byDay[day]||{n:0,pts:0,allExact:true}; byDay[day].n++; byDay[day].pts+=t; if(!(p.h===r.h&&p.a===r.a))byDay[day].allExact=false;
    if(best===null||t>best.t)best={t,id};
    if(worst===null||t<worst.t)worst={t,id};
    const c=cons[id];
    if(c&&c.total>=3&&po!==c.top){contrarianTries++;const against=c.tally[c.top]/c.total;if(boldest===null||against>boldest.against)boldest={against,id,t};}

  });

  } else if(loneWolf.length>=2){

    ins.push({tier:1,score:97,icon:"🐺",text:`<b>ذئب الشلة:</b> ظبطت ${loneWolf.length} ماتشات لوحدك مفيش حد غيرك عرفها (زي ${names}). عرّاف! 🔮🔥`});

  for(const d in byDay){const x=byDay[d];if(x.n>=3&&x.pts===x.n*5){perfectDay=d;break;}}
  if(perfectDay) ins.push({tier:2,score:74,icon:"🏆",text:`<b>يوم مثالي:</b> في مجموعة ${perfectDay} ظبطت كل الماتشات بالنتيجة. يومك كان نار. 🔥`});
  if(boldest && boldest.t>=2){ ins.push({tier:2,score:72,mid:boldest.id,icon:"🦅",text:`<b>ضد التيار:</b> لما ${Math.round(boldest.against*100)}% من الشلة راحوا عكسك، قلت ${pickLabel(boldest.id,pk(boldest.id))} وكسبت. وحش! 🔥`}); }
  if(contrarianTries<=played*0.1) ins.push({tier:3,score:48,icon:"🐑",text:`<b>مع القطيع:</b> نادراً ما بتخالف رأي الشلة. آمن... بس ممل شوية. 😴`});
  else if(contrarianTries>=played*0.5) ins.push({tier:3,score:50,icon:"🎭",text:`<b>روح ثورية:</b> نص توقعاتك عكس الشلة. مستقل برأيك يا فيلسوف. 🧠`});

/* build the final card: title + tiered-shuffled insights, de-duplicated by match, capped */
function perfCard(pl, title, cons, rmap){
  if(!pl) return [{icon:"⏳",text:"لسه مفيش توقعات. (Not enough graded picks yet.)"}];
  let ins=detectInsights(pl,cons,rmap);
  // group by tier, shuffle within each tier (seeded by name+tier), then concat tiers in order
  const byTier={};
  ins.forEach(i=>{ const t=(i.tier==null?4:i.tier); (byTier[t]=byTier[t]||[]).push(i); });
  let ordered=[];
  Object.keys(byTier).map(Number).sort((a,b)=>a-b).forEach(t=>{ ordered=ordered.concat(seededShuffle(byTier[t],pl.name+":"+t)); });
  // dedup by match id, cap at 5
  const seen=new Set(); const picked=[];
  for(const i of ordered){ if(i.mid){ if(seen.has(i.mid))continue; seen.add(i.mid); } picked.push(i); if(picked.length>=5)break; }
  const out=[];
  if(title) out.push({icon:title.split(" ")[0], text:`<b>${title.split(" ").slice(1).join(" ")}</b>`});
  return out.concat(picked);
}

    // ===== group stage reveal: collapsed accordions (stage is done; secondary focus) =====
    const anyOpen=Object.values(LB_OPEN_GROUPS).some(Boolean);
    h+=`<div class="lb-groupwrap"><div class="lb-grouptop"><span class="gs-title">Group stage</span><button class="btn ghost sm" id="lbToggleAll">${anyOpen?"Collapse all":"Expand all"}</button></div>`;
    for(const g of Object.keys(GROUPS)){
      const open=!!LB_OPEN_GROUPS[g];
      h+=`<div class="card lb-acc"><div class="grouphdr lb-acchdr" data-lbgroup="${g}" style="cursor:pointer"><span class="gname">Group ${g}</span><span class="teams">${GROUPS[g].map(t=>flagImg(t,'sm')).join(" ")}</span><span class="lb-caret2" style="margin-left:8px;color:var(--faint)">${open?"▴":"▾"}</span></div>`;
      h+=`<div class="lb-accbody" data-lbbody="${g}" style="display:${open?'block':'none'}">`;
      for(const m of M.filter(x=>x.grp===g)){
        const res=RESULTS[m.id];
        h+=`<div class="match"><div class="meta"><span>${flagImg(m.home,'sm')} ${esc(m.home)} v ${esc(m.away)} ${flagImg(m.away,'sm')}</span><span class="dot"></span><span>${esc(fmtKO(m.ko))}</span>${res?`<span class="result-chip final">FT ${res.h}–${res.a}</span>`:""}</div><div style="display:flex;flex-wrap:wrap;gap:7px">`;
        const preds=ALL.map(p=>({name:p.name,pred:p.picks[m.id]})).filter(x=>x.pred);
        if(preds.length===0)h+=`<span class="mini">No predictions for this match.</span>`;
        preds.forEach(x=>{
          const pts=res?scorePoints(x.pred,res):null;
          h+=`<span style="background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:5px 10px;font-size:12px"><b style="font-weight:600">${esc(x.name)}</b> <span style="color:var(--muted)">${x.pred.h}–${x.pred.a}</span>${pts!==null?` <span class="pts-badge ${PTS_CLASS(pts)}">+${pts}</span>`:""}</span>`;
        });
        h+=`</div></div>`;
      }
      h+=`</div></div>`;
    }
    h+=`</div>`;
  }
  root.innerHTML=h;
  // what's-new strip: tap head to expand, ✕ to dismiss for the session
  const nx=root.querySelector("#newsX");
  if(nx) nx.onclick=(e)=>{ e.stopPropagation(); NEWS_DISMISSED=true; renderLeaderboard(); };
  const nh=root.querySelector("#newsHead");
  if(nh) nh.onclick=()=>{ NEWS_OPEN=!NEWS_OPEN; renderLeaderboard(); };
  const _cons=buildConsensus();
  const _rmap=buildRightMap();
  const _statsByName={}; ALL.forEach(p=>{ _statsByName[p.name]=playerStats(p,_cons); });
  const _titles=assignSuperlatives(Object.values(_statsByName));
  const _byName={}; ALL.forEach(p=>_byName[p.name]=p);
  root.querySelectorAll(".lbrow").forEach(row=>{
    row.style.cursor="pointer";
    row.onclick=()=>{
      const name=row.dataset.player;
      const perf=root.querySelector(`.perfrow[data-perf="${CSS.escape(name)}"]`);
      const caret=root.querySelector(`.lbcaret[data-caret="${CSS.escape(name)}"]`);
      if(!perf)return;
      const open=perf.style.display!=="none";
      if(open){ perf.style.display="none"; if(caret)caret.textContent="▾"; return; }
      const cell=perf.querySelector(".perfcell");
      if(cell && !cell.dataset.filled){
        const lines=perfCard(_byName[name], _titles[name], _cons, _rmap);
        const photo = isHussen(name) ? `<div class="hussen-photo"><img src="${HUSSEN_IMG}" alt="Hussen, immortalised"><div class="cap">🪵 حسين منحوت في شجرة — خالد للأبد 😄</div></div>` : "";
        cell.innerHTML=`<div class="perfcard">`+photo+lines.map(l=>`<div class="perfline"><span class="pi">${l.icon}</span><span>${l.text}</span></div>`).join("")+`</div>`;
        cell.dataset.filled="1";
      }
      perf.style.display="";
      if(caret)caret.textContent="▴";
    };
  });
  // group accordions: toggle in place, persist state in LB_OPEN_GROUPS
  root.querySelectorAll(".lb-acchdr").forEach(hdr=>{
    hdr.onclick=()=>{
      const g=hdr.dataset.lbgroup;
      const body=root.querySelector(`[data-lbbody="${g}"]`);
      const caret=hdr.querySelector(".lb-caret2");
      const nowOpen = !(LB_OPEN_GROUPS[g]);
      LB_OPEN_GROUPS[g]=nowOpen;
      if(body) body.style.display=nowOpen?"block":"none";
      if(caret) caret.textContent=nowOpen?"▴":"▾";
    };
  });
  const allBtn=root.querySelector("#lbToggleAll");
  if(allBtn) allBtn.onclick=()=>{
    const anyOpen=Object.keys(GROUPS).some(g=>LB_OPEN_GROUPS[g]);
    Object.keys(GROUPS).forEach(g=>{ LB_OPEN_GROUPS[g]=!anyOpen; });
    Object.keys(GROUPS).forEach(g=>{
      const body=root.querySelector(`[data-lbbody="${g}"]`);
      const hdr=root.querySelector(`.lb-acchdr[data-lbgroup="${g}"]`);
      if(body) body.style.display=(!anyOpen)?"block":"none";
      if(hdr){const c=hdr.querySelector(".lb-caret2"); if(c)c.textContent=(!anyOpen)?"▴":"▾";}
    });
    allBtn.textContent=(!anyOpen)?"Collapse all":"Expand all";
  };
}

/* ===== scoring rules ===== */
function rulesHTML(){
  return `<div class="card pad">
    <h2 style="font-size:18px;font-weight:700;margin-bottom:6px">How points work</h2>
    <p style="color:var(--muted);font-size:14px;margin-bottom:16px">You predict the exact scoreline of every match. After each game, points are awarded automatically based on how close you were.</p>
    <div class="scoring-grid">
      <div class="sc-card"><div class="pn gold">5</div><div class="pl"><b>Exact score</b><br>You nailed the precise scoreline (you said 2–1, it finished 2–1).</div></div>
      <div class="sc-card"><div class="pn blue">3</div><div class="pl"><b>Right margin</b><br>Correct winner and correct goal difference, wrong score (2–1 vs an actual 3–2).</div></div>
      <div class="sc-card"><div class="pn gray">2</div><div class="pl"><b>Right result</b><br>Correct winner or correctly called a draw, wrong margin (2–1 vs 4–0).</div></div>
      <div class="sc-card"><div class="pn" style="color:#f0908f">0</div><div class="pl"><b>Missed</b><br>Wrong outcome — you backed the other side or missed a draw.</div></div>
    </div>
    <h3 style="font-size:15px;font-weight:700;margin:22px 0 6px">Worked examples</h3>
    <table class="lb" style="border:1px solid var(--line);border-radius:11px;overflow:hidden">
      <thead><tr><th>You predicted</th><th>Actual result</th><th class="r">Points</th></tr></thead>
      <tbody>
        <tr><td>Brazil 2–1</td><td>Brazil 2–1</td><td class="r pts" style="color:var(--gold)">5</td></tr>
        <tr><td>Brazil 2–1</td><td>Brazil 3–2</td><td class="r pts" style="color:#7ab6ec">3</td></tr>
        <tr><td>Brazil 2–1</td><td>Brazil 4–0</td><td class="r pts" style="color:var(--draw)">2</td></tr>
        <tr><td>Draw 1–1</td><td>Draw 2–2</td><td class="r pts" style="color:var(--draw)">2</td></tr>
        <tr><td>Draw 1–1</td><td>Draw 1–1</td><td class="r pts" style="color:var(--gold)">5</td></tr>
        <tr><td>Brazil 2–1</td><td>Morocco 1–0</td><td class="r pts" style="color:#f0908f">0</td></tr>
      </tbody>
    </table>
    <p class="hint">Leaderboard ties break by number of exact scores, then by correct results.</p>
  </div>
  <div class="card pad">
    <h2 style="font-size:18px;font-weight:700;margin-bottom:6px">Knockout rounds</h2>
    <p style="color:var(--muted);font-size:14px;margin-bottom:14px">Same 5 / 3 / 2 / 0 base, multiplied by the round. You predict the score at 90 minutes.</p>
    <table class="lb" style="border:1px solid var(--line);border-radius:11px;overflow:hidden">
      <thead><tr><th>Round</th><th class="r">Exact</th><th class="r">Margin</th><th class="r">Result</th></tr></thead>
      <tbody>
        <tr><td>Round of 32 (×1.5)</td><td class="r pts">8</td><td class="r mini">5</td><td class="r mini">3</td></tr>
        <tr><td>Round of 16 (×2)</td><td class="r pts">10</td><td class="r mini">6</td><td class="r mini">4</td></tr>
        <tr><td>Quarter-final (×3)</td><td class="r pts">15</td><td class="r mini">9</td><td class="r mini">6</td></tr>
        <tr><td>Semi-final (×4)</td><td class="r pts">20</td><td class="r mini">12</td><td class="r mini">8</td></tr>
        <tr><td>Final & 3rd (×5)</td><td class="r pts">25</td><td class="r mini">15</td><td class="r mini">10</td></tr>
      </tbody>
    </table>
    <h3 style="font-size:15px;font-weight:700;margin:18px 0 6px">Penalties</h3>
    <p style="color:var(--muted);font-size:13.5px;line-height:1.6">If you predict a draw, tick <b>goes to penalties</b> and choose who advances. Your scoreline is scored as usual (tier × round multiplier). On top, if the match really goes to penalties and you correctly predicted a draw, ticked penalties, and named the surviving team, you earn a flat <b>+3 bonus</b> — the same in every round and <b>not</b> multiplied. This rewards calling the shootout winner on its own, separately from the scoreline. Example: in a semi-final, predicting the wrong draw score (2–2 for an actual 1–1) but the right survivor scores (2 × 4) + 3 = <b>11</b>; nailing the exact draw and the survivor scores (5 × 4) + 3 = <b>23</b>.</p>

/* ===== admin / results ===== */
function renderAdmin(){
  const root=$("adminRoot");
  if(!IS_ADMIN){
    root.innerHTML=`<div class="card pad gate">
      <h2>Enter match results</h2>
      <p>Whoever runs the pool enters final scores here. Points are awarded to everyone automatically. Enter the admin code to unlock.</p>
      <input type="text" id="adminIn" placeholder="Admin code" autocomplete="off">
      <button class="btn block" id="adminBtn">Unlock results entry</button>
      <div class="hint">Set the code in the <code>ADMIN_CODE</code> line of the file before sharing. Later, results entry can be replaced by an automatic feed from a football API.</div>
    </div>`;
    $("adminBtn").onclick=()=>{if($("adminIn").value.trim()===ADMIN_CODE){IS_ADMIN=true;loadAdminData();}else toast("Wrong code");};
    $("adminIn").addEventListener("keydown",e=>{if(e.key==="Enter")$("adminBtn").click();});
    return;
  }
  let h=`<div class="banner ok"><span>🔓</span><span>Results entry unlocked. Set a score and tap <b>Save</b> — points recompute for everyone immediately. Leave a match blank if unplayed.</span></div>`;
  for(const g of Object.keys(GROUPS)){
    h+=`<div class="card"><div class="grouphdr"><span class="gname">Group ${g}</span></div>`;
    for(const m of M.filter(x=>x.grp===g)){
      const r=RESULTS[m.id];
      h+=`<div class="admin-match"><div class="teamcol home">${flagImg(m.home,'sm')}<span class="nm">${esc(m.home)}</span></div>
        <div class="admin-score">
          <input type="text" inputmode="numeric" maxlength="2" id="r-${m.id}-h" value="${r?r.h:''}" placeholder="–">
          <span style="color:var(--faint)">:</span>
          <input type="text" inputmode="numeric" maxlength="2" id="r-${m.id}-a" value="${r?r.a:''}" placeholder="–">
          <button class="btn sm" data-save="${m.id}" style="margin-left:8px">Save</button>
          ${r?`<button class="btn sm danger" data-clear="${m.id}" style="margin-left:4px">Clear</button>`:""}
        </div>
        <div class="teamcol away"><span class="nm">${esc(m.away)}</span>${flagImg(m.away,'sm')}</div></div>`;
    }
    h+=`</div>`;
  }
  /* ===== knockout admin ===== */
  h+=`<div class="card pad"><h2 style="font-size:16px;font-weight:700;margin-bottom:6px">Knockout stage</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:6px">For each round: set the two teams + kickoff (this opens predictions and the round in the bracket), then after the match enter the score. For a draw, tick penalties and choose who advanced — that drives knockout scoring and the bracket.</p></div>`;
  h+=`<div class="roundnav">`;
  for(const r of KO_ROUNDS){ h+=`<button data-adminround="${r.key}" class="${KO_ACTIVE_ROUND===r.key?"on":""}">${r.name}</button>`; }
  h+=`</div>`;
  const ar=KO_BY_KEY[KO_ACTIVE_ROUND];
  for(let i=0;i<ar.n;i++){
    const id=`${ar.key}-${i}`, fx=KOFIX[id]||{home:"",away:"",ko:"",venue:""}, res=KORES[id];
    const label = ar.key==="F" ? (i===0?"Final":"Third place") : `${ar.name} · M${i+1}`;
    h+=`<div class="card"><div class="grouphdr"><span class="gname">${label}</span></div><div style="padding:14px 18px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <input type="text" id="kf-${id}-home" value="${esc(fx.home||'')}" placeholder="Home team" style="text-align:left">
        <input type="text" id="kf-${id}-away" value="${esc(fx.away||'')}" placeholder="Away team" style="text-align:left">
      </div>
      <input type="text" id="kf-${id}-ko" value="${esc(fx.ko||'')}" placeholder="Kickoff ISO e.g. 2026-07-05T19:00Z" style="text-align:left;margin-bottom:10px">
      <button class="btn sm" data-savefix="${id}">Save fixture</button>
      <div style="border-top:1px solid var(--line);margin:14px 0;padding-top:14px">
        <div class="admin-score" style="justify-content:flex-start">
          <span class="mini" style="width:90px">Final score</span>
          <input type="text" inputmode="numeric" maxlength="2" id="kr-${id}-h" value="${res?res.h:''}" placeholder="–">
          <span style="color:var(--faint)">:</span>
          <input type="text" inputmode="numeric" maxlength="2" id="kr-${id}-a" value="${res?res.a:''}" placeholder="–">
        </div>
        <div class="pens-row" style="justify-content:flex-start;margin-top:10px">
          <label><input type="checkbox" id="kp-${id}" ${res&&res.pens?"checked":""}> Went to penalties</label>
        </div>
        <div style="margin-top:8px"><input type="text" id="ka-${id}" value="${esc(res&&res.advTeam?res.advTeam:'')}" placeholder="Team that advanced (for pens / to confirm winner)" style="text-align:left"></div>
        <div style="margin-top:10px"><button class="btn sm" data-saveko="${id}">Save result</button>
        ${res?`<button class="btn sm danger" data-clearko="${id}" style="margin-left:6px">Clear</button>`:""}</div>
      </div>
    </div></div>`;
  }
  /* ===== golden winners admin ===== */
  const gw=GOLDEN_WINNERS||{};
  h+=`<div class="card pad"><h2 style="font-size:16px;font-weight:700;margin-bottom:10px">Golden award winners</h2>
    <div class="award-row"><label>Golden Boot</label><input type="text" id="gw-boot" value="${esc(gw.boot||'')}" placeholder="Top scorer" style="text-align:left"></div>
    <div class="award-row"><label>Golden Glove</label><input type="text" id="gw-glove" value="${esc(gw.glove||'')}" placeholder="Best goalkeeper" style="text-align:left"></div>
    <div class="award-row"><label>Golden Ball</label><input type="text" id="gw-ball" value="${esc(gw.ball||'')}" placeholder="Best player" style="text-align:left"></div>
    <button class="btn sm" id="saveGolden">Save winners</button>
    <div class="hint" style="text-align:left">Names are matched case-insensitively against each player's pick. Set these at the end of the tournament.</div>
  </div>`;
  root.innerHTML=h;
  root.querySelectorAll("[data-save]").forEach(b=>b.onclick=()=>saveResult(b.dataset.save));
  root.querySelectorAll("[data-clear]").forEach(b=>b.onclick=()=>clearResult(b.dataset.clear));
  root.querySelectorAll("[data-adminround]").forEach(b=>b.onclick=()=>{KO_ACTIVE_ROUND=b.dataset.adminround;renderAdmin();});
  root.querySelectorAll("[data-savefix]").forEach(b=>b.onclick=()=>saveKoFixture(b.dataset.savefix));
  root.querySelectorAll("[data-saveko]").forEach(b=>b.onclick=()=>saveKoResult(b.dataset.saveko));
  root.querySelectorAll("[data-clearko]").forEach(b=>b.onclick=()=>clearKoResult(b.dataset.clearko));
  const sg=$("saveGolden"); if(sg)sg.onclick=saveGoldenWinners;
}
async function loadAdminData(){
  try{
    RESULTS=await fbLoadResults();
    KORES=await fbLoadKoResults();
    GOLDEN_WINNERS=await fbLoadGoldenWinners();
    const fx=await fbLoadKoFix();
    const ver = fx && fx.__ver ? fx.__ver : 0;
    if(fx && Object.keys(fx).length && ver>=KOFIX_SEED_VERSION){ KOFIX=fx; }
    else {
      const seeded=seededKoFixtures();
      if(fx){ for(const id in fx){ if(!id.startsWith("R32-") && id!=="__ver" && fx[id] && fx[id].home) seeded[id]=fx[id]; } }
      KOFIX=seeded;
    }
  }catch(e){}
  renderAdmin();
}
async function saveKoFixture(id){
  const home=$(`kf-${id}-home`).value.trim(), away=$(`kf-${id}-away`).value.trim(), ko=$(`kf-${id}-ko`).value.trim();
  KOFIX[id]={home,away,ko,venue:(KOFIX[id]||{}).venue||""};
  try{await fbSaveKoFix(KOFIX);toast("Fixture saved");}catch(e){toast("Save failed");}
  renderAdmin();
}
async function saveKoResult(id){
  const hv=parseInt($(`kr-${id}-h`).value,10),av=parseInt($(`kr-${id}-a`).value,10);
  if(isNaN(hv)||isNaN(av)||hv<0||av<0){toast("Enter both scores");return;}
  const pens=$(`kp-${id}`).checked, adv=$(`ka-${id}`).value.trim();
  if(hv===av && pens && !adv){toast("Enter who advanced on penalties");return;}
  KORES[id]={h:hv,a:av,pens,advTeam:adv||null};
  try{await fbSaveKoResults(KORES);toast(`Saved ${hv}–${av} · points updated`);}catch(e){toast("Save failed");}
  renderAdmin();
}
async function clearKoResult(id){
  delete KORES[id];
  try{await fbSaveKoResults(KORES);toast("Result cleared");}catch(e){toast("Save failed");}
  renderAdmin();
}
async function saveGoldenWinners(){
  GOLDEN_WINNERS={boot:$("gw-boot").value.trim(),glove:$("gw-glove").value.trim(),ball:$("gw-ball").value.trim()};
  try{await fbSaveGoldenWinners(GOLDEN_WINNERS);toast("Winners saved · awards scored");}catch(e){toast("Save failed");}
  renderAdmin();
}
async function saveResult(mid){
  const hv=parseInt($(`r-${mid}-h`).value,10),av=parseInt($(`r-${mid}-a`).value,10);
  if(isNaN(hv)||isNaN(av)||hv<0||av<0){toast("Enter both scores");return;}
  RESULTS[mid]={h:hv,a:av};
  try{await fbSaveResults(RESULTS);toast(`Saved ${hv}–${av} · points updated`);}catch(e){toast("Save failed");}
  renderAdmin();
}
async function clearResult(mid){
  delete RESULTS[mid];
  try{await fbSaveResults(RESULTS);toast("Result cleared");}catch(e){toast("Save failed");}
  renderAdmin();
}

</script>
